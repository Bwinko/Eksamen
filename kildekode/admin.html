<!DOCTYPE html>
<html>
<head>
    <title>Admin</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <h1>Admin</h1>

        <h2>Legg til produkt</h2>
        <input id="navn" placeholder="Navn">
        <input id="beskrivelse" placeholder="Beskrivelse">
        <input id="pris" placeholder="Pris">
        <input id="kategori_id" placeholder="Kategori ID">
        <button onclick="leggTil()">Legg til</button>

        <h2>Produkter</h2>
        <div id="produkter"></div><!-- produktliste med slett-knapp -->
    </div>

    <script>
        // henter og viser alle produkter
        function hentProdukter() {
            fetch('/produkter')
                .then(res => res.json())
                .then(data => {
                    document.getElementById('produkter').innerHTML = '';
                    data.forEach(p => {
                        document.getElementById('produkter').innerHTML += 
                            `<p>${p.navn} - ${p.pris}kr 
                            <button onclick="slett(${p.id})">Slett</button></p>`;
                    });
                });
        }

        // legger til nytt produkt i databasen
        function leggTil() {
            fetch('/admin/produkter', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    navn: document.getElementById('navn').value,
                    beskrivelse: document.getElementById('beskrivelse').value,
                    pris: document.getElementById('pris').value,
                    kategori_id: document.getElementById('kategori_id').value
                })
            }).then(() => hentProdukter());
        }

        // sletter produkt basert på id
        function slett(id) {
            fetch('/admin/produkter/' + id, {
                method: 'DELETE'
            }).then(() => hentProdukter());
        }

        hentProdukter();
    </script>
</body>
</html>
