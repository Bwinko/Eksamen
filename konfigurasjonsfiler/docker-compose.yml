services:
  web:
    image: node:18                          # bruker node versjon 18
    working_dir: /app                       # mappe inne i containeren
    volumes:
      - .:/app                              # kobler prosjektmappen din til containeren
    command: node kildekode/index.js        # starter serveren
    ports:
      - "3000:3000"                         # kundeside, åpen for alle
    networks:
      - public                              # koblet til public-nettverket

  admin:
    image: node:18
    working_dir: /app
    volumes:
      - .:/app
    command: node kildekode/index.js
    ports:
      - "127.0.0.1:3001:3000"              # kun tilgjengelig lokalt på maskinen
    networks:
      - internal                            # koblet til internal-nettverket

networks:
  public:
    driver: bridge                          # vanlig nettverk, åpent utenfra
  internal:
    driver: bridge                          # internt nettverk, kun lokalt
    internal: true                          # blokkerer ekstern trafikk