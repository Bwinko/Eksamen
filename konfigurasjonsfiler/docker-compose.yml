services:
  web:
    image: node:20
    working_dir: /app
    volumes:
      - C:/Eksamen:/app                        
    command: sh -c "rm -rf node_modules && npm install && node kildekode/index.js"

    ports:
      - "3000:3000"
    networks:
      - public

  admin:
    image: node:18
    working_dir: /app
    volumes:
      - ../:/app                          
    command: sh -c "rm -rf node_modules && npm install && node kildekode/index.js"
    ports:
      - "127.0.0.1:3001:3000"
    networks:
      - internal

networks:
  public:
    driver: bridge
  internal:
    driver: bridge
    internal: true